services:
  mongo:
    image: mongo:8
    container_name: ims_mongo
    restart: always
    command: ["--replSet", "rs0", "--bind_ip_all" ]
    volumes:
      - mongo_data:/data/db
    networks:
      - ims_net


  backend:
    image: ghcr.io/codemonix/ims_backend:latest
    container_name: ims_backend
    restart: unless-stopped
    env_file: .env.backend
    environment:
      - DB_URI=mongodb://ims_mongo:27017/ims?replicaSet=rs0
      - PORT=5000
    ports:
      - "5000:5000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpu: '0.50'
          memory: 512M
        reservations:
          cpu: '0.250'
          memory: 256M
    depends_on:
      - mongo
    networks:
      - ims_net

  frontend:
    image: ghcr.io/codemonix/ims_frontend:latest
    container_name: ims_frontend
    restart: unless-stopped
    networks:
      - ims_net
    environment:
      - API_BASE=/api
      - BASE_PATH=
    ports:
      - "3000:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpu: '0.25'
          memory: '128m'

        reservations:
          cpus: '0.05'
          memory: 64M


networks:
  ims_net:
    driver: bridge
volumes:
  mongo_data:
